# TravisCI configuration for voku/Stringy

if: "branch = master"

language: "php"
os:
  - "linux"
dist: "bionic"

addons:
  apt:
    sources:
      - sourceline: "ppa:ondrej/php"

jobs:
  fast_finish: true
  include:
    - name: "PHP 7.4"
      addons:
        apt:
          packages:
            - "php7.4-cli"
            - "php7.4-xdebug"

    - name: "PHP 7.3"
      addons:
        apt:
          packages:
            - "php7.3-cli"
            - "php7.3-xdebug"

    - name: "PHP 7.2"
      addons:
        apt:
          packages:
            - "php7.2-cli"
            - "php7.2-xdebug"

    - name: "PHP 7.1"
      addons:
        apt:
          packages:
            - "php7.1-cli"
            - "php7.1-xdebug"

    - name: "PHP 7.0"
      addons:
        apt:
          packages:
            - "php7.0-cli"
            - "php7.0-xdebug"

    - name: "PHP 8.0"
      addons:
        apt:
          packages:
            - "php8.0-cli"
            - "php8.0-xdebug"

    - name: "Static analysis"
      php: "7.1"
      script:
        - "travis_retry composer require --no-interaction --dev phpstan/phpstan"
        - "vendor/bin/phpstan analyse"
      after_script: "skip"
  allow_failures:
    - name: "PHP 8.0"

git:
  depth: 2

cache:
  directories:
    - "${HOME}/.composer/cache"

before_install:
  # Verify disable PHP extensions
  - |
    ! php --ri mbstring
    ! php --ri intl
    ! php --ri iconv
  - "mkdir -p build/logs"

install:
  - "travis_retry composer update --no-interaction --prefer-dist --optimize-autoloader"

script:
  - "vendor/bin/phpunit --verbose"

after_script:
  # Upload to Coveralls
  - "travis_retry composer require --no-interaction --prefer-source --dev php-coveralls/php-coveralls"
  - "vendor/bin/php-coveralls -v"
  # Upload to Scrutinizer
  - "wget https://scrutinizer-ci.com/ocular.phar"
  - "php ocular.phar code-coverage:upload --format=php-clover build/logs/clover.xml"
  # Upload to Codecov
  - "bash <(curl -s https://codecov.io/bash)"
